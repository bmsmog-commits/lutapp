<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fbbc04">
    <title>Lutapp Notes Offline</title>
    <style>
        body {
            display: grid;
            min-height: 100vh;
            margin: 0;
            place-items: center;
            background: #f8fafd;
            color: #202124;
            font-family: Arial, Helvetica, sans-serif;
        }
        main {
            width: min(420px, calc(100% - 32px));
            border: 1px solid #dadce0;
            border-radius: 8px;
            background: #fff;
            padding: 28px;
            box-shadow: 0 8px 28px rgba(60, 64, 67, .10);
        }
        h1 { margin: 0 0 8px; font-size: 26px; }
        p { margin: 0; color: #5f6368; line-height: 1.5; }
    </style>
</head>
<body>
    <main>
        <h1>You are offline</h1>
        <p>Lutapp Notes is installed, but this page was not cached yet. Reconnect and open your notes again.</p>
    </main>
</body>
</html>
